services:
  # Backend API service
  - type: web
    name: captcha-shield-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # Don't sync this to the repo
      - key: DATABASE_SSL
        value: true
